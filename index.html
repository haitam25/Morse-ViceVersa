<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Morse Code Translator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-wrapper">
    <div class="container">
        <h2 class="shimmer">Morse <span>Pro</span></h2>
        
        <div class="input-group">
            <label>English Text</label>
            <textarea id="englishInput" placeholder="Type something..."></textarea>
        </div>

        <div class="input-group">
            <label>Morse Code</label>
            <textarea id="morseInput" placeholder=".... . .-.. .-.. ---"></textarea>
        </div>
        
        <p class="hint">Pro Tip: Use <b>/</b> to separate words.</p>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
