<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morse Viceversa | Telemetry Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="glass-wrapper">
    <div class="container">
        <h2 class="shimmer">Morse <span>Viceversa</span></h2>
        
        <div class="input-group">
            <label>Live English Stream</label>
            <textarea id="englishInput" placeholder="Type to encrypt..."></textarea>
        </div>

        <div class="input-group">
            <label>Telemetry Signal (Morse)</label>
            <textarea id="morseInput" placeholder=".... . .-.. .-.. ---"></textarea>
        </div>
        
        <p class="hint">DATA_STATUS: <b>Operational</b> | Word_Break: <b>/</b></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
